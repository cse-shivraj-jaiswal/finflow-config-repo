server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

  zipkin:
    base-url: http://zipkin:9411

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}

        - id: application-service
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/applications/**
          filters:
            - RewritePath=/applications/(?<segment>.*), /${segment}

        - id: document-service
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/documents/**
          filters:
            - RewritePath=/documents/(?<segment>.*), /${segment}

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/admin/**
          filters:
            - RewritePath=/admin/(?<segment>.*), /${segment}

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

    discovery:
      locator:
        enabled: false

management:
  tracing:
    sampling:
      probability: 1.0

eureka:
  instance:
    prefer-ip-address: true
    hostname: api-gateway

  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: finflow_super_secure_jwt_secret_key_2026_project_backend
  expiration: 86400000
