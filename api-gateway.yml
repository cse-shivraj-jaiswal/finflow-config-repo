server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:

      routes:

        # 🔐 AUTH SERVICE
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}

        # 📄 APPLICATION SERVICE
        - id: application-service
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/applications/**
          filters:
            - RewritePath=/applications/(?<segment>.*), /${segment}

        # 📁 DOCUMENT SERVICE
        - id: document-service
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/documents/**
          filters:
            - RewritePath=/documents/(?<segment>.*), /${segment}

        # 🧑‍💼 ADMIN SERVICE
        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/admin/**
          filters:
            - RewritePath=/admin/(?<segment>.*), /${segment}

      # 🌍 GLOBAL CORS
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

    discovery:
      locator:
        enabled: false
        lower-case-service-id: false   # ✅ IMPORTANT FIX

# 🔥 EUREKA CONFIG
eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 10

# 🔥 SWAGGER AGGREGATION
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: AUTH-SERVICE
        url: /auth/v3/api-docs
      - name: APPLICATION-SERVICE
        url: /applications/v3/api-docs
      - name: DOCUMENT-SERVICE
        url: /documents/v3/api-docs
      - name: ADMIN-SERVICE
        url: /admin/v3/api-docs

# 🔥 LOGGING
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

# 🔥 ACTUATOR
management:
  endpoints:
    web:
      exposure:
        include: "*"

# 🔐 JWT (FUTURE USE)
jwt:
  secret: finflow_super_secure_jwt_secret_key_2026_project_backend
  expiration: 86400000
