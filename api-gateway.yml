server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:

        # ==========================================
        # 📄 SWAGGER INTERCEPTOR ROUTES 
        # ==========================================
        - id: auth-swagger
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/v3/api-docs/**
          filters:
            - RewritePath=/auth/(?<segment>.*), /${segment}

        - id: application-swagger
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/applications/v3/api-docs/**
          filters:
            - RewritePath=/applications/(?<segment>.*), /${segment}

        - id: document-swagger
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/documents/v3/api-docs/**
          filters:
            - RewritePath=/documents/(?<segment>.*), /${segment}

        - id: admin-swagger
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/admin/v3/api-docs/**
          filters:
            - RewritePath=/admin/(?<segment>.*), /${segment}

        # ==========================================
        # 🔐 STANDARD BUSINESS ROUTES (Prefix Preserved)
        # ==========================================
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: application-service
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/applications/**

        - id: document-service
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/documents/**

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/admin/**

      # 🌍 GLOBAL CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"

# ==========================================
# 📄 SWAGGER AGGREGATION
# ==========================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    primary-name: auth-service
    display-operation-id: false
    urls:
      - name: auth-service
        url: /auth/v3/api-docs
      - name: application-service
        url: /applications/v3/api-docs
      - name: document-service
        url: /documents/v3/api-docs
      - name: admin-service
        url: /admin/v3/api-docs

# ==========================================
# 🔬 MONITORING
# ==========================================
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: finflow_super_secure_jwt_secret_key_2026_project_backend


