server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth/(?<sub>.*), /${sub}

        - id: application-service
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/applications/**
          filters:
            - RewritePath=/applications/(?<sub>.*), /${sub}

        - id: document-service
          uri: lb://DOCUMENT-SERVICE
          predicates:
            - Path=/documents/**
          filters:
            - RewritePath=/documents/(?<sub>.*), /${sub}

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/admin/**
          filters:
            - RewritePath=/admin/(?<sub>.*), /${sub}

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"

# 📄 SWAGGER AGGREGATION
# 📄 SWAGGER AGGREGATION
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # 🔥 This line ensures AUTH-SERVICE is selected by default
    primary-name: 🔐 AUTH-SERVICE
    operations-sorter: alpha
    urls:
      - name: 🔐 AUTH-SERVICE
        url: /auth/v3/api-docs
      - name: 📂 APPLICATION-SERVICE
        url: /applications/v3/api-docs
      - name: 📄 DOCUMENT-SERVICE
        url: /documents/v3/api-docs
      - name: 🧑‍💼 ADMIN-SERVICE
        url: /admin/v3/api-docs




# 🔬 Zipkin & Management
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: gateway,health,info,metrics

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: finflow_super_secure_jwt_secret_key_2026_project_backend
  expiration: 86400000
