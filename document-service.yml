# 📄 DOCUMENT-SERVICE.yml
server:
  port: 8083

spring:
  application:
    name: DOCUMENT-SERVICE

  # 🐇 RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  datasource:
    url: jdbc:mysql://localhost:3306/document_db
    username: root
    password: Shivraj@123

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 🔬 Zipkin Tracing
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

file:
  upload-dir: uploads/

eureka:
  instance:
    prefer-ip-address: true
